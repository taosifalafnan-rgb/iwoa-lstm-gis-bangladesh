# ============================================================
# config.yaml — IWOA-LSTM GIS Bangladesh
# SINGLE SOURCE OF TRUTH — never hardcode parameters in source
# ============================================================

# ── REPRODUCIBILITY ─────────────────────────────────────────
seed: 42

# ── STUDY AREA ──────────────────────────────────────────────
study_area:
  districts: ["Gazipur", "Narayanganj"]
  bbox:
    xmin: 90.20
    ymin: 23.55
    xmax: 90.70
    ymax: 24.10
  crs: "EPSG:4326"
  crs_local: "EPSG:32646"   # UTM Zone 46N for distance calcs

# ── DATE RANGES ─────────────────────────────────────────────
dates:
  historical_start: "2000-01-01"
  historical_end:   "2024-12-31"
  forecast_start:   "2025-01-01"
  forecast_end:     "2040-12-31"
  train_end:        "2018-12-31"
  val_end:          "2021-12-31"
  # test: 2022-01-01 to 2024-12-31

# ── DATA PATHS ──────────────────────────────────────────────
data:
  doe_dir:       "data/doe/"
  bwdb_dir:      "data/bwdb/"
  satellite_dir: "data/satellite/"
  census_file:   "data/census/bbs_population_ward.csv"
  chirps_dir:    "data/satellite/chirps/"
  era5_file:     "data/satellite/era5/era5_monthly.csv"

  processed:
    features_file:    "data/processed/features/feature_matrix.csv"
    sequences_dir:    "data/processed/sequences/"
    scenarios_dir:    "data/processed/scenarios/"

  # Expected column schemas
  doe_columns:
    required: ["date", "station", "pm25", "no2", "so2", "co", "aqi"]
    optional: ["pm10", "o3"]
    date_format: "%Y-%m-%d"

  bwdb_columns:
    required: ["date", "station", "river", "bod", "do", "ph", "turbidity"]
    date_format: "%Y-%m-%d"

  census_columns:
    required: ["ward_id", "district", "upazila", "year", "population", "area_km2"]

# ── PREPROCESSING ───────────────────────────────────────────
preprocessing:
  imputation_method: "knn"    # options: knn, linear, mean
  knn_neighbors: 5
  normalization: "minmax"     # options: minmax, zscore
  normalization_range: [0, 1]

  lag_features:               # lag windows in months
    pm25: [1, 3, 6]
    ndvi: [1, 3, 12]
    lst:  [1, 3]
    bod:  [1, 3]

  outlier_method: "iqr"       # options: iqr, zscore, none
  outlier_threshold: 3.0

# ── SPECTRAL INDICES ────────────────────────────────────────
indices:
  ndvi:
    formula: "(B4 - B3) / (B4 + B3)"
    bands: {nir: "B4", red: "B3"}
  ndbi:
    formula: "(B5 - B4) / (B5 + B4)"
    bands: {swir1: "B5", nir: "B4"}
  mndwi:
    formula: "(B2 - B5) / (B2 + B5)"
    bands: {green: "B2", swir1: "B5"}
  ui:
    formula: "(B5 - B4) / (B5 + B4)"
    bands: {swir2: "B7", nir: "B4"}
  lst:
    method: "mono_window"
    thermal_band: "B6"

# ── FEATURE POOL (input to IWOA) ────────────────────────────
features:
  pool:
    - "pm25"
    - "no2"
    - "so2"
    - "co"
    - "bod"
    - "do"
    - "ph"
    - "turbidity"
    - "ndvi"
    - "ndbi"
    - "mndwi"
    - "lst"
    - "uhi_intensity"
    - "precipitation"
    - "temperature"
    - "humidity"
    - "industrial_fraction"
    - "pop_density"
    - "dist_industrial"
    - "pm25_lag3"
    - "ndvi_lag12"
    - "lst_lag1"
    - "bod_lag3"
  n_total: 23

  targets:                    # LSTM output variables
    - "pm25"                  # Air quality proxy
    - "bod"                   # Water quality proxy
    - "lst"                   # Thermal stress
    - "ndvi"                  # Green cover

# ── IWOA ────────────────────────────────────────────────────
iwoa:
  n_whales: 30
  max_iter: 200
  max_features: 15            # Maximum features IWOA can select
  levy_lambda: 1.5            # Levy exponent (1 < lambda <= 3)
  omega_max: 0.9              # Inertia weight maximum
  omega_min: 0.4              # Inertia weight minimum
  obl_enabled: true           # Opposition-Based Learning init
  b_constant: 1.0             # Spiral shape constant
  save_convergence: true
  convergence_file: "outputs/results/iwoa_convergence.csv"
  results_file: "outputs/results/iwoa_best_config.json"
  features_file: "outputs/results/iwoa_best_features.json"

  # Hyperparameter search bounds for LSTM
  hp_bounds:
    hidden_1:    [32, 256]
    hidden_2:    [16, 128]
    dropout:     [0.1, 0.5]
    learning_rate: [0.0001, 0.01]
    batch_size:  [8, 64]
    lookback:    [6, 24]

  # Mini-LSTM for fitness evaluation (fast proxy)
  proxy_lstm:
    hidden: 32
    layers: 1
    epochs: 30

# ── LSTM ────────────────────────────────────────────────────
lstm:
  # These defaults are overridden by IWOA output at runtime
  input_size: 15             # Set by IWOA
  hidden_1: 128
  hidden_2: 64
  n_layers: 2
  dropout: 0.3
  output_size: 4             # pm25, bod, lst, ndvi
  lookback: 12               # months
  batch_size: 16
  bidirectional: false

# ── TRAINING ────────────────────────────────────────────────
training:
  max_epochs: 200
  patience: 20               # Early stopping patience
  loss: "huber"              # options: huber, mse, mae
  huber_delta: 1.0
  optimizer: "adamw"
  weight_decay: 0.01
  lr_scheduler: "cosine"     # options: cosine, step, none
  cv_folds: 5                # Temporal block K-fold
  checkpoint_dir: "outputs/checkpoints/"
  best_model_file: "outputs/checkpoints/best_lstm.pth"

# ── MONTE CARLO DROPOUT (uncertainty) ───────────────────────
mc_dropout:
  enabled: true
  n_samples: 50              # Forward passes at inference
  confidence: 0.95           # For uncertainty band

# ── SCENARIOS ───────────────────────────────────────────────
scenarios:
  BAU:
    description: "Business As Usual"
    industrial_growth_rate: 0.045
    etp_compliance_rate: 0.30
    green_loss_rate: 0.020
    pop_growth_rate: 0.018

  S1:
    description: "Moderate Regulation"
    industrial_growth_rate: 0.025
    etp_compliance_rate: 0.60
    green_loss_rate: 0.010
    pop_growth_rate: 0.015

  S2:
    description: "Green Industrialization"
    industrial_growth_rate: 0.015
    etp_compliance_rate: 0.95
    green_loss_rate: 0.000
    pop_growth_rate: 0.012

# ── AHP WEIGHTS (HHI) ───────────────────────────────────────
ahp:
  criteria: ["air_quality", "water_quality", "thermal_stress",
             "green_cover", "socioeconomic"]

  # Pairwise comparison matrix (Saaty 1-9 scale)
  # Row criterion vs Column criterion
  pairwise_matrix:
    - [1,    2,    3,    4,    3  ]   # air_quality
    - [0.5,  1,    2,    3,    2  ]   # water_quality
    - [0.33, 0.5,  1,    2,    2  ]   # thermal_stress
    - [0.25, 0.33, 0.5,  1,    1  ]   # green_cover
    - [0.33, 0.5,  0.5,  1,    1  ]   # socioeconomic

  # Saaty Random Index values
  ri_values: {1: 0.0, 2: 0.0, 3: 0.58, 4: 0.90, 5: 1.12,
              6: 1.24, 7: 1.32, 8: 1.41, 9: 1.45, 10: 1.49}

  max_cr: 0.10               # Consistency Ratio must be below this

# ── HHI ─────────────────────────────────────────────────────
hhi:
  scale: [0, 100]            # All sub-indices normalized to this
  convention: "higher_worse" # higher HHI = worse habitability

  # Internal weights per sub-index component
  c1_air_weights:
    pm25: 0.40
    no2:  0.25
    so2:  0.20
    co:   0.15

  c2_water_weights:
    bod:       0.35
    do:        0.35
    ph:        0.15
    turbidity: 0.15

  c3_thermal_weights:
    lst:           0.60
    uhi_intensity: 0.40

  c4_green_weights:
    ndvi:       0.70
    green_loss: 0.30

  c5_socio_weights:
    pop_density:         0.40
    dist_industrial_inv: 0.35
    industrial_fraction: 0.25

  # Bangladesh NAAQS reference thresholds (Air Pollution Rules 2022)
  thresholds:
    pm25_annual_naaqs:  35.0   # μg/m³
    pm25_24hr_naaqs:    65.0
    no2_annual_naaqs:   40.0   # μg/m³
    no2_24hr_naaqs:     80.0
    so2_24hr_naaqs:     80.0   # μg/m³
    co_8hr_naaqs:       5.0    # mg/m³
    bod_max:            6.0    # mg/L (ECR 1997 Class C)
    do_saturation:      8.0    # mg/L
    ph_min: 6.0
    ph_max: 9.0
    turbidity_max:      10.0   # NTU

  # Vulnerability classification
  vulnerability_zones:
    acceptable: [0,  25]
    moderate:   [25, 50]
    at_risk:    [50, 75]
    critical:   [75, 100]

# ── SPATIAL ANALYSIS ────────────────────────────────────────
spatial:
  hotspot:
    method: "getis_ord_gi_star"
    spatial_weights: "knn"
    k_neighbors: 8
    significance_levels: [0.90, 0.95, 0.99]

  uhi:
    rural_ndvi_threshold: 0.4   # NDVI > 0.4 = rural reference zone
    interpolation: "kriging"    # options: kriging, idw

  lulc_classes:
    1: "built_up"
    2: "vegetation"
    3: "water_body"
    4: "bare_land"
    5: "industrial"

# ── VISUALIZATION ───────────────────────────────────────────
visualization:
  dpi: 300
  figure_format: "png"         # options: png, pdf, svg
  colormap_hhi: "RdYlGn_r"    # Red=critical, Green=acceptable
  colormap_lst: "RdYlBu_r"
  colormap_ndvi: "RdYlGn"
  figure_dir: "outputs/figures/"
  map_dir: "outputs/maps/"

# ── WEIGHTS & BIASES ────────────────────────────────────────
wandb:
  enabled: true
  project: "iwoa-lstm-bangladesh"
  entity: null                 # Set to your W&B username
  run_name: null               # Auto-generated if null
  tags: ["LSTM", "IWOA", "GIS", "Bangladesh", "environmental"]
  log_interval: 10             # Log every N epochs

# ── LOGGING ─────────────────────────────────────────────────
logging:
  level: "INFO"                # DEBUG, INFO, WARNING, ERROR
  log_file: "outputs/results/run_log.txt"
  console: true
